name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Project site -> base must be "/<repo>/"; a "<user>.github.io" repo serves from "/".
      - name: Resolve Vite base path from the repository name
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/$REPO/" >> "$GITHUB_ENV"
          fi

      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
